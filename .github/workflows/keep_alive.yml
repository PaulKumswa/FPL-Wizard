name: Keep Alive Ping

on:
  schedule:
    # Run every 14 minutes to beat the 15-minute inactivity timeout
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Website
        run: |
          curl -I https://fplunderdogs-com.onrender.com
          echo "Ping sent to https://fplunderdogs-com.onrender.com"

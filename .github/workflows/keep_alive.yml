name: Keep Alive Ping

on:
  schedule:
    # Run every 5 minutes. Sleep up to 10 mins. Max gap = 5 + 10 = 15 mins (edge case).
    # Normally much less.
    - cron: '4,11,18,26,33,41,49,57 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Website
        run: |
          curl -I https://fplunderdogs-com.onrender.com
          echo "Ping sent to https://fplunderdogs-com.onrender.com"

name: Weekly FPL Data Update

on:
  schedule:
    # Run every 6 hours to check if deadline is approaching
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Check Deadline
        id: check
        run: |
          python src/check_deadline.py
          
      - name: Run data pipeline
        if: steps.check.outputs.should_update == 'true'
        run: |
          python update_pipeline.py --no-serve
          
      - name: Commit and push if changes
        if: steps.check.outputs.should_update == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/processed/* models/* data/history/*
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Weekly model retrain [skip ci]" && git push)
